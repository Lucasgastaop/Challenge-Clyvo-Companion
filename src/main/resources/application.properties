spring.application.name=clyvo-companion

# Perfil padrao: Oracle (ajuste com suas credenciais FIAP)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:oracle}

# JPA
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Paginacao (Spring Data)
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=50

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Cache em memoria (requisito do challenge)
spring.cache.type=simple
